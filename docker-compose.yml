services:
  llm-summary:
    build: .
    env_file:
      - .env
    environment:
      - LLM_SUMMARY_CONFIG=/config/config.toml
      - LLM_SUMMARY_DB=/data/llm-summary.sqlite
      - LLM_SUMMARY_SITE=/site
    volumes:
      - ./data:/data          # SQLite DB (+ optional raw dumps)
      - ./site:/site          # generated static HTML (serve this directly)
      - ./config:/config:ro   # read-only / ephemeral config
    # Lets the container reach a proxy/service running on the host. On Docker
    # Desktop (macOS/Windows) host.docker.internal already resolves; this mapping
    # adds it on Linux too. Set the proxy to e.g. socks5h://host.docker.internal:1080
    # (NOT localhost, which inside the container points at the container itself).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["run-daily"]

  # Optional: serve the generated archive. Out of scope for the MVP pipeline,
  # but the dedicated /site volume makes it a drop-in.
  # site:
  #   image: nginx:alpine
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./site:/usr/share/nginx/html:ro
