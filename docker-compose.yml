services:
  llm-summary:
    build: .
    # Run as a non-root host user so files written to ./data and ./site are owned
    # by you, not root. Set UID/GID in .env to your `id -u` / `id -g` (default
    # 1000:1000). The mounted ./data and ./site must be writable by that uid/gid —
    # see the README "Running as a non-root user" note.
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      - LLM_SUMMARY_CONFIG=/config/config.toml
      - LLM_SUMMARY_DB=/data/llm-summary.sqlite
      - LLM_SUMMARY_SITE=/site
    volumes:
      - ./data:/data          # SQLite DB (+ optional raw dumps)
      - ./site:/site          # generated static HTML (serve this directly)
      - ./config:/config:ro   # read-only / ephemeral config
    # Host networking: the container shares the host's network stack, so
    # services bound to the host's loopback are reachable as plain 127.0.0.1.
    # This lets `run-daily --collect-metrics` reach a host Pushgateway on
    # 127.0.0.1:50100 (the --push-gateway default) without overriding the
    # address, and a host-local proxy works as e.g. socks5h://127.0.0.1:1080.
    # Linux-native; Docker Desktop (macOS/Windows) needs 4.34+ with host
    # networking enabled — otherwise drop this line and use
    # host.docker.internal with the extra_hosts mapping below.
    network_mode: host
    # Only used without network_mode: host (bridge networking): makes the host
    # reachable as host.docker.internal on Linux too, e.g.
    # --push-gateway host.docker.internal:50100 (requires the Pushgateway to
    # listen on an address containers can reach, not only 127.0.0.1).
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    command: ["run-daily"]

  # Optional: serve the generated archive. Out of scope for the MVP pipeline,
  # but the dedicated /site volume makes it a drop-in.
  # site:
  #   image: nginx:alpine
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./site:/usr/share/nginx/html:ro
