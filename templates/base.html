<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}llm-summary{% endblock %}</title>
  <link rel="stylesheet" href="{{ asset_href }}">
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <a class="brand" href="{{ breadcrumbs[0].href or '#' }}">llm-summary</a>
      <nav class="breadcrumbs">
        {% for crumb in breadcrumbs %}
          {% if crumb.href %}<a href="{{ crumb.href }}">{{ crumb.label }}</a>{% else %}<span>{{ crumb.label }}</span>{% endif %}{% if not loop.last %} / {% endif %}
        {% endfor %}
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>Generated by llm-summary — a quiet daily archive. GitHub is the source of truth.</p>
    </footer>
  </div>
</body>
</html>
